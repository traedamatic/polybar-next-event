; polybar-next-event module configuration
; Add this to your polybar config (e.g., ~/.config/polybar/config.ini)
;
; 1. Add "next-event" to your bar's modules list:
;    modules-right = ... next-event ...
;
; 2. Adjust the paths below to match your installation.

[module/next-event]
type = custom/script

; Path to the built polybar output script
exec = bun /path/to/polybar-next-event/dist/polybar/output.js

; Click to open the event detail dialog
click-left = bun /path/to/polybar-next-event/dist/dialog/show-dialog.js

; How often to refresh (in seconds)
interval = 60

; Formatting
format = <label>
; Use a Nerd Font icon if your polybar font supports it, otherwise plain text
; format-prefix = " "
; format-prefix-foreground = #81A1C1

; Label displays the script output (includes polybar color tags)
label = %output%
label-maxlen = 50
